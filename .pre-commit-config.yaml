#!/bin/bash

repos:
- repo: local
  hooks:
  - id: check-json
    name: check json
    description: checks json files for parseable syntax.
    entry: check-json
    language: python
    types: [json]

  - id: check-toml
    name: check toml
    description: checks toml files for parseable syntax.
    entry: check-toml
    language: python
    types: [toml]

  - id: check-yaml
    name: check yaml
    description: checks yaml files for parseable syntax.
    entry: check-yaml
    language: python
    types: [yaml]

  - id: end-of-file-fixer
    name: fix end of files
    description: ensures that a file is either empty, or ends with one newline.
    entry: end-of-file-fixer
    language: python
    types: [text]
    stages: [pre-commit, pre-push, manual]

  - id: trailing-whitespace
    name: trim trailing whitespace
    description: trims trailing whitespace.
    entry: trailing-whitespace-fixer
    language: python
    types: [text]
    stages: [pre-commit, pre-push, manual]

  - id: codespell
    name: codespell
    description: Checks for common misspellings in text files.
    entry: codespell
    language: python
    types: [python]
    args: [
      "quickpaver docs tests",
      "*.py *.rst *.md",
    ]
    exclude: >
            (?x)^(
                bibliography.bib
            )$

  - id: ruff check
    name: ruff check
    entry: ruff check
    language: python
    types_or: [ python, pyi]
    args: [--fix, --exit-non-zero-on-fix]

  - id: ruff-format
    name: ruff format
    entry: ruff format
    language: python
    types_or: [ python, pyi, jupyter]

  - id: ty
    name: ty check
    entry: ty check .
    language: system
    types_or: [python, pyi]
