name: CI

on:
  push:
    # on every branch
    branches:
      - '**'

env:
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
  QT_DEBUG_PLUGINS: 1
  QT_QPA_PLATFORM: offscreen

jobs:
  static_analysis:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install dependencies with uv
        run: |
          pip install uv
          uv venv
          uv pip install -e ".[all]"

      - name: Run pre-commit hooks
        run: |
          uv run pre-commit run --all-files  # Run pre-commit inside the uv virtual environment

        continue-on-error: false

      - name: Upload pre-commit report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: pre-commit-report
          path: pre-commit-report

  tests:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        numba-variant: ["with-numba", "without-numba"]

    env:
      NUMBA_DISABLE_JIT: 1

    needs:
      - static_analysis

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv + deps
        run: |
          pip install uv
          uv venv
          uv pip install -e ".[all]"

      - name: Uninstall numba for 'without-numba' variant
        if: matrix.numba-variant == 'without-numba'
        run: |
          uv pip uninstall -y numba

      - name: Run tests with coverage
        env:
          COVERAGE_FILE: .coverage.${{ matrix.python-version }}.${{ matrix.numba-variant }}
        run: |
          uv run pytest \
            --cov=quickpaver \
            --cov-config=.coveragerc \
            --cov-report=term \
            --color=yes

      - name: find
        run: find . -type f -name '.coverage*'

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}-${{ matrix.numba-variant }}
          path: ${{ github.workspace }}/.coverage.${{ matrix.python-version }}.${{ matrix.numba-variant }}
          include-hidden-files: true
          if-no-files-found: error


  coverage-merge:
    runs-on: ubuntu-22.04
    needs:
      - tests

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install coverage
        run: pip install coverage

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v7
        with:
          path: coverage-data

      - name: List downloaded coverage files
        run: |
          echo "=== All downloaded files ==="
          find coverage-data -type f | head -20
          echo ""
          echo "=== Coverage files ==="
          find coverage-data -name '.coverage*' -print

      - name: Combine coverage
        run: |
          coverage combine $(find coverage-data -name '.coverage*')
          coverage report -m
          coverage html
          coverage xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
